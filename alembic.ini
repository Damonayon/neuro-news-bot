[alembic]
# Каталог скриптов миграций
script_location = migrations

# Шаблон имени файла миграции
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(slug)s

# Каталог, относительно которого ищется код приложения. Корень проекта.
prepend_sys_path = .

# URL подключения. Реально берётся из env (см. migrations/env.py),
# но Alembic требует, чтобы поле было заполнено. Это плейсхолдер.
sqlalchemy.url = sqlite:///data/bot.db


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
