name: ✅ Проверка одобрений

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

# Общая группа с generate.yml — оба workflow пишут в data/bot.db.
concurrency:
  group: data-write
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Клонируем репозиторий
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 + кэш
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Зависимости
        run: pip install -r requirements.txt

      - name: 🔍 Проверяем одобрения
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MODERATOR_ID: ${{ secrets.TELEGRAM_MODERATOR_ID }}
          TELEGRAM_CHANNEL_ID:   ${{ secrets.TELEGRAM_CHANNEL_ID }}
          # GH_MODELS_TOKEN не нужен для публикации, но требуется на старте
          # (pydantic-settings валидирует все поля). Передаём пустую строку — это допустимо,
          # т.к. фактически он не вызывается в этом скрипте.
          GH_MODELS_TOKEN:       ${{ secrets.GH_MODELS_TOKEN }}

          CHANNEL_TOPIC:    ${{ vars.CHANNEL_TOPIC    || 'Нейро-новости' }}
          CHANNEL_NICHE:    ${{ vars.CHANNEL_NICHE    || 'искусственный интеллект и нейросети' }}
          CHANNEL_AUDIENCE: ${{ vars.CHANNEL_AUDIENCE || 'русскоязычные, 18-45 лет, интересуются технологиями и будущим' }}
          CHANNEL_LANG:     ${{ vars.CHANNEL_LANG     || 'русский' }}
        run: python scripts/check_approvals.py

      - name: 💾 Сохраняем данные
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name  "Neuro-News Bot"
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true
          git add data/
          git diff --staged --quiet || git commit -m "✅ Очередь [skip ci]"
          git push
