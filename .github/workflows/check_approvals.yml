name: ✅ Проверка одобрений

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: check-approvals
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Клонируем репозиторий
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 + кэш
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Зависимости
        run: pip install -r requirements.txt

      - name: 🔍 Проверяем одобрения
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MODERATOR_ID: ${{ secrets.TELEGRAM_MODERATOR_ID }}
          TELEGRAM_CHANNEL_ID:   ${{ secrets.TELEGRAM_CHANNEL_ID }}
          CHANNEL_TOPIC:         ${{ vars.CHANNEL_TOPIC || 'Нейро-новости' }}
        run: python scripts/check_approvals.py

      - name: 💾 Сохраняем данные
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name  "Neuro-News Bot"
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add data/
          git diff --staged --quiet || git commit -m "✅ Очередь [skip ci]"
          git push || true
